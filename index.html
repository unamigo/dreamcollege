<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Founder's Compass — Undergraduate Entrepreneurship Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16181D; --ink-soft:#33373F; --paper:#FBFAF6; --paper-2:#F4F1E9; --card:#FFFFFF;
  --line:#E6E1D5; --line-2:#EFEBE1; --muted:#6E6A5F; --muted-2:#908B7E;
  --gold:#B5832B; --gold-soft:#F2E7CE; --green:#2E7D55; --green-soft:#E1F0E7;
  --amber:#B4631E; --amber-soft:#F7E8D6; --red:#9E3324;
  --accent:#16181D; --accent2:#33373F;
  --shadow:0 1px 2px rgba(20,20,18,.04),0 8px 28px rgba(20,20,18,.06);
  --shadow-lg:0 2px 6px rgba(20,20,18,.06),0 24px 60px rgba(20,20,18,.12);
  --r:16px; --r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;font-size:16px}
.serif{font-family:'Fraunces',serif}
a{color:inherit;text-decoration:none}
img{max-width:100%}

/* ---------- TOP BAR ---------- */
.topbar{position:sticky;top:0;z-index:60;background:rgba(251,250,246,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);}
.topbar-in{max-width:1200px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:18px}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer;flex-shrink:0}
.brand .mark{width:30px;height:30px;border-radius:8px;background:var(--ink);color:var(--paper);display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:600;font-size:18px;flex-shrink:0}
.brand .mark span{transform:translateY(-1px)}
.brand-txt{display:flex;flex-direction:column;line-height:1.05}
.brand-txt b{font-family:'Fraunces',serif;font-weight:600;font-size:16px;letter-spacing:.1px}
.brand-txt small{font-size:10.5px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:600}
.topbar-spacer{flex:1}
.fresh{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);background:var(--paper-2);border:1px solid var(--line);padding:6px 11px;border-radius:999px;white-space:nowrap}
.fresh .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-soft);animation:pulse 2.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.tb-btn{font-size:13px;font-weight:600;color:var(--ink-soft);padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--card);cursor:pointer;white-space:nowrap;transition:.15s}
.tb-btn:hover{border-color:var(--ink);color:var(--ink)}
.tb-back{display:none;align-items:center;gap:7px}
body.detail .tb-back{display:inline-flex}
body.detail .tb-home-only{display:none}

/* ---------- WRAP ---------- */
.wrap{max-width:1200px;margin:0 auto;padding:0 28px}
.view{display:none;animation:fade .4s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- HERO ---------- */
.hero{padding:64px 0 30px;border-bottom:1px solid var(--line)}
.hero .eyebrow{font-size:12.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:18px}
.hero h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(36px,5.4vw,62px);line-height:1.02;letter-spacing:-.5px;max-width:16ch}
.hero h1 em{font-style:italic;color:var(--ink-soft)}
.hero .lede{font-size:18px;color:var(--ink-soft);max-width:60ch;margin-top:22px}
.hero .meta-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px}
.pill{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--ink-soft);background:var(--card);border:1px solid var(--line);padding:8px 14px;border-radius:999px}
.pill .ic{color:var(--gold)}

/* ---------- CONTROLS ---------- */
.controls{display:flex;flex-wrap:wrap;align-items:center;gap:14px;padding:24px 0 8px;position:sticky;top:61px;background:linear-gradient(var(--paper) 78%,rgba(251,250,246,0));z-index:30}
.ctrl-group{display:flex;align-items:center;gap:8px}
.ctrl-label{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
.seg{display:inline-flex;background:var(--paper-2);border:1px solid var(--line);border-radius:999px;padding:3px}
.seg button{font-family:inherit;font-size:12.5px;font-weight:600;color:var(--muted);background:none;border:none;padding:6px 13px;border-radius:999px;cursor:pointer;transition:.15s;white-space:nowrap}
.seg button.on{background:var(--ink);color:var(--paper)}
.controls .spacer{flex:1}
.count{font-size:13px;color:var(--muted);font-weight:500}

/* ---------- CARD GRID ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:22px;padding:24px 0 10px}
.scard{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:0;overflow:hidden;cursor:pointer;transition:.22s cubic-bezier(.2,.7,.3,1);display:flex;flex-direction:column}
.scard:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--line-2)}
.scard .topbar-accent{height:5px;background:var(--ac)}
.scard-body{padding:22px 22px 20px}
.scard-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.scard h3{font-family:'Fraunces',serif;font-weight:600;font-size:23px;line-height:1.08;letter-spacing:-.2px}
.scard .loc{font-size:13px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:6px}
.ring{flex-shrink:0}
.verdict-chip{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:.02em;padding:5px 10px;border-radius:999px;margin-top:14px}
.scard .ent{font-size:13.5px;color:var(--ink-soft);margin-top:14px;line-height:1.5;border-top:1px solid var(--line-2);padding-top:14px;min-height:54px}
.scard .ent b{color:var(--ink);font-weight:600}
.scard-foot{margin-top:auto;display:flex;justify-content:space-between;align-items:center;gap:10px;border-top:1px solid var(--line-2);padding:14px 22px;background:var(--paper)}
.kv{display:flex;flex-direction:column;gap:2px}
.kv .k{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);font-weight:700}
.kv .v{font-size:13.5px;font-weight:600;color:var(--ink)}
.kv .v.amberv{color:var(--amber)}
.badge-sel{font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px;background:var(--paper-2);border:1px solid var(--line);color:var(--ink-soft);white-space:nowrap}

/* ---------- TABLE ---------- */
.tablewrap{padding:18px 0;overflow-x:auto}
table.cmp{width:100%;border-collapse:collapse;font-size:14px;min-width:760px}
table.cmp th,table.cmp td{text-align:left;padding:14px 16px;border-bottom:1px solid var(--line-2)}
table.cmp th{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;cursor:pointer;user-select:none;white-space:nowrap}
table.cmp th:hover{color:var(--ink)}
table.cmp tbody tr{cursor:pointer;transition:.12s}
table.cmp tbody tr:hover{background:var(--paper-2)}
table.cmp .sname{font-family:'Fraunces',serif;font-weight:600;font-size:16px;display:flex;align-items:center;gap:10px}
table.cmp .swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.fitnum{font-weight:700;font-variant-numeric:tabular-nums}

/* ---------- rolling out ---------- */
.rollout{margin:30px 0 70px;padding:24px 26px;border:1px dashed var(--line);border-radius:var(--r);background:var(--paper-2)}
.rollout h4{font-family:'Fraunces',serif;font-weight:600;font-size:17px;margin-bottom:5px}
.rollout p{font-size:13.5px;color:var(--muted);margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:9px}
.chip-soon{font-size:13px;font-weight:600;color:var(--muted-2);background:var(--card);border:1px solid var(--line);padding:7px 13px;border-radius:999px;opacity:.8}
.chip-soon::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted-2);margin-right:8px;vertical-align:middle}

/* ---------- methodology ---------- */
.method{margin:14px 0 40px;border:1px solid var(--line);border-radius:var(--r);background:var(--card);overflow:hidden}
.method summary{list-style:none;cursor:pointer;padding:18px 24px;display:flex;align-items:center;gap:12px;font-weight:600;font-size:15px}
.method summary::-webkit-details-marker{display:none}
.method summary .plus{margin-left:auto;font-size:20px;color:var(--muted);transition:.2s}
.method[open] summary .plus{transform:rotate(45deg)}
.method-body{padding:0 24px 24px;border-top:1px solid var(--line-2);font-size:14px;color:var(--ink-soft)}
.method-body h5{font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:18px 0 10px}
.wbar{display:flex;align-items:center;gap:12px;margin:9px 0}
.wbar .wlab{width:230px;font-weight:600;font-size:13.5px}
.wbar .wtrack{flex:1;height:8px;background:var(--paper-2);border-radius:999px;overflow:hidden}
.wbar .wfill{height:100%;background:var(--gold);border-radius:999px}
.wbar .wpct{width:42px;text-align:right;font-weight:700;font-size:13px;font-variant-numeric:tabular-nums}
.tag-legend{display:flex;flex-wrap:wrap;gap:16px;margin-top:8px}
.tag-legend span{display:inline-flex;align-items:center;gap:7px;font-size:13px}

/* ---------- DETAIL ---------- */
.dhead{position:relative;color:#fff;border-radius:0;overflow:hidden}
.dhead-bg{position:absolute;inset:0;background:linear-gradient(135deg,var(--ac) 0%,var(--ac2) 100%)}
.dhead-bg::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 120% at 85% -10%,rgba(255,255,255,.18),transparent 55%)}
.dhead-mono{position:absolute;right:-10px;bottom:-44px;font-family:'Fraunces',serif;font-weight:600;font-size:230px;line-height:1;color:rgba(255,255,255,.09);pointer-events:none;user-select:none}
.dhead-in{position:relative;max-width:1200px;margin:0 auto;padding:46px 28px 40px;display:flex;justify-content:space-between;align-items:flex-end;gap:30px;flex-wrap:wrap}
.dhead .kicker{font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;opacity:.8;margin-bottom:12px}
.dhead h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(34px,5vw,56px);line-height:1.0;letter-spacing:-.5px}
.dhead .dmeta{display:flex;flex-wrap:wrap;gap:10px 18px;margin-top:18px;font-size:14px;font-weight:500;opacity:.94}
.dhead .dmeta span{display:inline-flex;align-items:center;gap:7px}
.dhead-fit{display:flex;flex-direction:column;align-items:center;gap:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:var(--r);padding:18px 22px;backdrop-filter:blur(6px)}
.dhead-fit .vlabel{font-family:'Fraunces',serif;font-weight:600;font-size:16px}
.dhead-fit .vsub{font-size:11px;letter-spacing:.1em;text-transform:uppercase;opacity:.8}

/* sub nav */
.subnav{position:sticky;top:61px;z-index:40;background:rgba(251,250,246,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.subnav-in{max-width:1200px;margin:0 auto;padding:0 28px;display:flex;gap:4px;overflow-x:auto}
.subnav a{font-size:13.5px;font-weight:600;color:var(--muted);padding:15px 14px;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s}
.subnav a:hover{color:var(--ink)}
.subnav a.on{color:var(--ink);border-bottom-color:var(--ac)}

.sec{padding:46px 0;border-bottom:1px solid var(--line-2);scroll-margin-top:120px}
.sec-h{display:flex;align-items:baseline;gap:14px;margin-bottom:8px}
.sec-h .n{font-family:'Fraunces',serif;font-style:italic;font-size:15px;color:var(--gold);font-weight:500}
.sec-h h2{font-family:'Fraunces',serif;font-weight:600;font-size:30px;letter-spacing:-.3px}
.sec .intro{font-size:16.5px;color:var(--ink-soft);max-width:74ch;margin-bottom:26px}
.sec .intro.big{font-size:19px;line-height:1.5;color:var(--ink)}

.cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:760px){.cols{grid-template-columns:1fr}}
.block{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px 24px}
.block h4{font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:14px}
.ul{list-style:none;display:flex;flex-direction:column;gap:11px}
.ul li{font-size:14.5px;color:var(--ink-soft);padding-left:24px;position:relative;line-height:1.5}
.ul li::before{content:"";position:absolute;left:2px;top:9px;width:7px;height:7px;border-radius:2px;background:var(--ac)}
.ul.tick li::before{content:"✓";background:none;color:var(--green);font-weight:800;top:0;left:0;font-size:14px}
.ul.warn li::before{content:"!";background:none;color:var(--amber);font-weight:800;top:-1px;left:3px;font-size:15px}

/* entrepreneurship */
.ent-banner{background:linear-gradient(135deg,var(--ac) 0%,var(--ac2) 130%);color:#fff;border-radius:var(--r);padding:28px 30px;margin-bottom:24px;position:relative;overflow:hidden}
.ent-banner .rank{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.04em;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);padding:6px 12px;border-radius:999px;margin-bottom:14px}
.ent-banner p{font-size:19px;line-height:1.45;font-family:'Fraunces',serif;font-weight:500;max-width:70ch}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:6px}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:18px 20px;transition:.18s}
.pcard:hover{box-shadow:var(--shadow);border-color:var(--line-2)}
.pcard .pt{font-weight:700;font-size:15px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.pcard .pt .d{width:8px;height:8px;border-radius:50%;background:var(--ac);flex-shrink:0}
.pcard .pd{font-size:13.5px;color:var(--muted);line-height:1.5}
.subhead{font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:28px 0 14px}

/* stat tiles */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:26px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:18px 20px}
.tile .tl{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:700}
.tile .tv{font-family:'Fraunces',serif;font-weight:600;font-size:27px;margin-top:7px;letter-spacing:-.3px}
.tile .tn{font-size:12px;color:var(--muted);margin-top:4px}

/* timeline */
.timeline{display:flex;flex-direction:column;gap:0;margin-top:6px}
.tlrow{display:flex;gap:18px;padding:16px 0;border-bottom:1px solid var(--line-2);align-items:center}
.tlrow:last-child{border-bottom:none}
.tldate{width:120px;flex-shrink:0;font-family:'Fraunces',serif;font-weight:600;font-size:20px}
.tlmid{flex:1}
.tlmid .tp{font-weight:600;font-size:15px}
.tlmid .tnote{font-size:13px;color:var(--muted);margin-top:2px}
.cyc{font-size:10.5px;font-weight:700;letter-spacing:.03em;padding:4px 9px;border-radius:6px;white-space:nowrap}
.cyc.ok{background:var(--green-soft);color:var(--green)}
.cyc.prior{background:var(--amber-soft);color:var(--amber)}

/* essays / accordion */
.essay-note{font-size:14.5px;color:var(--ink-soft);background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 18px;margin-bottom:18px;display:flex;gap:10px;align-items:flex-start}
.essay-note .ic{color:var(--gold);font-weight:800}
.acc{border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;margin-bottom:12px;background:var(--card)}
.acc summary{list-style:none;cursor:pointer;padding:16px 20px;display:flex;align-items:center;gap:14px}
.acc summary::-webkit-details-marker{display:none}
.acc .qmeta{flex:1}
.acc .qt{font-weight:600;font-size:15px;line-height:1.35}
.acc .qsub{font-size:12.5px;color:var(--muted);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.req{font-size:10.5px;font-weight:700;letter-spacing:.03em;padding:3px 8px;border-radius:5px;text-transform:uppercase}
.req.r{background:#F3E3E0;color:var(--red)}
.req.o{background:var(--paper-2);color:var(--muted)}
.acc .exp{font-size:22px;color:var(--muted);transition:.2s;flex-shrink:0}
.acc[open] .exp{transform:rotate(45deg)}
.acc-body{padding:4px 20px 20px;border-top:1px solid var(--line-2)}
.acc-body .ptext{font-size:15px;line-height:1.6;color:var(--ink);font-family:'Fraunces',serif;font-weight:400;padding-top:14px}
.opt-intro{font-size:13.5px;color:var(--muted);font-style:italic;margin:6px 0 12px}

/* fit */
.fit-wrap{display:grid;grid-template-columns:280px 1fr;gap:30px;align-items:start}
@media(max-width:760px){.fit-wrap{grid-template-columns:1fr}}
.fit-score-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:28px;text-align:center}
.fit-score-card .bigv{font-family:'Fraunces',serif;font-weight:700;font-size:30px;margin-top:14px}
.fit-score-card .bigsub{font-size:13px;color:var(--muted);margin-top:4px}
.bars{display:flex;flex-direction:column;gap:18px}
.bar .blab{display:flex;justify-content:space-between;font-size:14px;font-weight:600;margin-bottom:7px}
.bar .blab .bn{color:var(--muted-2);font-variant-numeric:tabular-nums;font-weight:700}
.bar .btrack{height:10px;background:var(--paper-2);border-radius:999px;overflow:hidden}
.bar .bfill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--ac),var(--ac2));transition:width .9s cubic-bezier(.2,.7,.3,1)}
.callout{margin-top:24px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:760px){.callout{grid-template-columns:1fr}}

/* footer */
.dfoot{padding:36px 0 80px;display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;align-items:center}
.dfoot .src{font-size:12.5px;color:var(--muted);max-width:60ch;line-height:1.5}
.navswitch{display:flex;gap:10px}
.navswitch button{font-family:inherit;font-size:13.5px;font-weight:600;border:1px solid var(--line);background:var(--card);padding:10px 16px;border-radius:999px;cursor:pointer;transition:.15s}
.navswitch button:hover{border-color:var(--ink)}
.sitefoot{border-top:1px solid var(--line);padding:30px 0;text-align:center;font-size:12.5px;color:var(--muted-2)}
/* news */
.newsfeed{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;padding:4px 0 8px}
.ncard{display:flex;flex-direction:column;gap:9px;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--ac,#999);border-radius:var(--r-sm);padding:16px 18px;transition:.18s}
.ncard:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.nctop{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--ink-soft)}
.nswatch{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.ndate{margin-left:auto;color:var(--muted-2);font-weight:600;font-size:11.5px}
.ntitle{font-family:'Fraunces',serif;font-weight:600;font-size:16px;line-height:1.25}
.nblurb{font-size:13px;color:var(--muted);line-height:1.5;flex:1}
.nsrc{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--gold)}
.newslist{display:flex;flex-direction:column}
.nrow{display:flex;gap:20px;padding:18px 2px;border-bottom:1px solid var(--line-2);align-items:flex-start;transition:.15s}
.nrow:last-child{border-bottom:none}
.nrow:hover{background:var(--paper-2)}
.nrow .nrdate{width:108px;flex-shrink:0;font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--ink-soft)}
.nrbody{flex:1;display:flex;flex-direction:column;gap:6px}
@media(max-width:600px){.nrow{flex-direction:column;gap:6px}.nrow .nrdate{width:auto}}
/* essays that worked */
.essaybox{margin-top:22px;border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:var(--r-sm);background:var(--paper-2);padding:18px 20px}
.essaybox h4{font-family:'Fraunces',serif;font-weight:600;font-size:16px;margin-bottom:6px}

  {t:"UMich essay examples (and why they worked)",s:"CollegeAdvisor",u:"https://www.collegeadvisor.com/essay-guides/university-of-michigan-essay-examples-and-why-they-worked/",m:"admitted 'Why Michigan' essays with ex-AO commentary"}
 ]
};

/* ============ HELPERS ============ */
const $=(s,e=document)=>e.querySelector(s);
function verdictColor(f){if(f>=90)return["#1d6b46","#dff0e6"];if(f>=85)return["#2E7D55","#e1f0e7"];if(f>=80)return["#8a6d1f","#f3e8c9"];if(f>=75)return["#9c6322","#f7e8d6"];return["#8a5a2a","#f1e4d3"];}
function verdictLabel(f){if(f>=90)return"Elite for builders";if(f>=85)return"Excellent fit";if(f>=80)return"Strong fit";if(f>=75)return"Solid fit";return"Situational fit";}
function ring(f,size=58,sw=6){const r=(size-sw)/2,c=2*Math.PI*r,off=c*(1-f/100),[col]=verdictColor(f);
 return `<svg class="ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--line)" stroke-width="${sw}"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"/><text x="50%" y="50%" text-anchor="middle" dy="0.35em" font-family="Fraunces,serif" font-weight="600" font-size="${size*0.32}" fill="var(--ink)">${f}</text></svg>`;}
const cyctag=c=>c==="ok"?'<span class="cyc ok">Confirmed 2026–27</span>':'<span class="cyc prior">Prior cycle · verify Aug 1</span>';
function fmtDate(iso){const d=new Date(iso+"T00:00:00");return isNaN(d)?iso:d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function allNews(){let a=[];for(const k in NEWS){(NEWS[k]||[]).forEach(it=>a.push(Object.assign({sid:k},it)));}return a.sort((x,y)=>(y.date||"").localeCompare(x.date||""));}

/* ============ HUB ============ */
let sortKey="fit",viewMode="cards";
const UPCOMING=[];
function sortedSchools(){const a=[...SCHOOLS];
 if(sortKey==="fit")a.sort((x,y)=>y.fit-x.fit);
 if(sortKey==="deadline")a.sort((x,y)=>x.dlSort-y.dlSort);
 if(sortKey==="selective")a.sort((x,y)=>x.rateNum-y.rateNum);
 if(sortKey==="az")a.sort((x,y)=>x.short.localeCompare(y.short));
 return a;}
function renderHub(){
 const list=sortedSchools();
 let body=list.map(s=>{const[vc,vb]=verdictColor(s.fit);const d=s.deadlines[0];
  return `<article class="scard" style="--ac:${s.ac};--ac2:${s.ac2}" onclick="go('${s.id}')">
   <div class="topbar-accent"></div>
   <div class="scard-body">
    <div class="scard-head"><div><h3>${s.name}</h3><div class="loc">◍ ${s.city}, ${s.state} · ${s.type}</div></div></div>
    <span class="verdict-chip" style="background:${vb};color:${vc}">${s.verdict}</span>
    <div class="ent">${s.cardEnt||s.entreRank.replace(/—.*/,'')}</div>
   </div>
   <div class="scard-foot">
    <div class="kv"><span class="k">Next deadline</span><span class="v amberv">${d.plan.split(' (')[0]} · ${d.date}</span></div>
    <span class="kv" style="text-align:right"><span class="k">Applies via</span><span class="v" style="font-weight:600">${s.platform}</span></span>
   </div></article>`;}).join("");
 const table=`<div class="tablewrap"><table class="cmp">
  <thead><tr>
   <th onclick="setSort('az')">School</th><th onclick="setSort('fit')">Fit verdict</th>
   <th>Entrepreneurship signal</th><th onclick="setSort('selective')">Selectivity</th>
   <th onclick="setSort('deadline')">Earliest deadline</th><th>Test policy</th><th>Sticker / yr</th>
  </tr></thead><tbody>${list.map(s=>`<tr onclick="go('${s.id}')">
   <td><span class="sname"><span class="swatch" style="background:${s.ac}"></span>${s.name}</span></td>
   <td><strong>${s.verdict}</strong></td>
   <td>${s.entreRank.replace(/—.*/,'')}</td>
   <td>${s.selectivity.rate} <span style="color:var(--muted)">${s.selectivity.tier}</span></td>
   <td>${s.deadlines[0].plan.split(' (')[0]} ${s.deadlines[0].date}</td>
   <td>${s.testPolicy}</td>
   <td>${s.cost.mode==='private'?s.cost.sticker:(s.cost.outState||s.cost.sticker)}</td>
  </tr>`).join("")}</tbody></table></div>`;
 const newsHub=allNews().slice(0,8).map(it=>{const s=SCHOOLS.find(x=>x.id===it.sid)||{ac:"#999",short:"—"};return `<a class="ncard" href="${it.url}" target="_blank" rel="noopener noreferrer" style="--ac:${s.ac}"><div class="nctop"><span class="nswatch" style="background:${s.ac}"></span>${s.short}<span class="ndate">${fmtDate(it.date)}</span></div><div class="ntitle">${it.title}</div><div class="nblurb">${it.blurb}</div><div class="nsrc">${it.source} ↗</div></a>`;}).join("");
 $("#hub").innerHTML=`
 <div class="wrap">
  <section class="hero">
   <div class="eyebrow">Undergraduate entrepreneurship · ${META.cycle}</div>
   <h1 class="serif">Where the <em>founders</em> get made.</h1>
   <p class="lede">A working atlas of twelve universities, judged on what actually matters if you want to build companies as an undergrad — the program, the money, the network, the ecosystem. Click any school for the full picture: strengths, the entrepreneurship engine, admissions, every application question, cost, and an honest fit verdict.</p>
  </section>
  <div class="controls">
   <div class="ctrl-group"><span class="ctrl-label">Sort</span>
    <div class="seg" id="sortseg">
     <button data-k="fit" class="on" onclick="setSort('fit')">Best fit</button>
     <button data-k="deadline" onclick="setSort('deadline')">Deadline</button>
     <button data-k="selective" onclick="setSort('selective')">Selectivity</button>
     <button data-k="az" onclick="setSort('az')">A–Z</button>
    </div></div>
   <div class="spacer"></div>
   <div class="ctrl-group"><span class="ctrl-label">View</span>
    <div class="seg" id="viewseg">
     <button data-v="cards" class="on" onclick="setView('cards')">Cards</button>
     <button data-v="table" onclick="setView('table')">Compare</button>
    </div></div>
  </div>
  ${viewMode==="cards"?`<div class="grid">${body}</div>`:table}
  <section style="padding:6px 0 8px;border-top:1px solid var(--line-2);margin-top:18px">
   <div class="sec-h" style="margin:14px 0 16px"><span class="n serif">✦</span><h2 class="serif" style="font-size:26px">Latest across your schools</h2><span style="margin-left:auto;font-size:12px;color:var(--muted);font-weight:600">↻ refreshed daily · ${META.newsUpdated}</span></div>
   <div class="newsfeed">${newsHub}</div>
  </section>

  ${UPCOMING.length?`<div class="rollout">
   <h4 class="serif">Rolling out soon</h4>
   <p>More schools are being added to this same dashboard. Same link — it just fills in.</p>
   <div class="chips">${UPCOMING.map(n=>`<span class="chip-soon">${n}</span>`).join("")}</div>
  </div>`:``}
  <details class="method" id="method">
   <summary><span style="color:var(--gold)">✦</span> How to read this &amp; data freshness <span class="plus">+</span></summary>
   <div class="method-body">
    <p>Each school carries a counselor's <b>fit verdict</b> for an entrepreneurship-focused undergraduate — an honest read on how strong a launchpad it is to build companies, considering the program, the experiential and funding ecosystem, founder outcomes and network, and location. It is <b>not</b> an admissions-chance estimate.</p>
    <h5>Data freshness</h5>
    <div class="tag-legend"><span>${cyctag('ok')} posted by the school for the upcoming cycle</span><span>${cyctag('prior')} most recent known version; 2026–27 not yet released</span></div>
    <h5>Make it personal</h5>
    <p>These verdicts are about program quality, not your odds. Share a student profile — intended major, GPA, test scores, home state, budget — and we can turn them into true <b>Reach / Target / Likely</b> calls per school.</p>
   </div>
  </details>
 </div>`;
}
function setSort(k){sortKey=k;renderHub();const seg=$("#sortseg");if(seg)[...seg.children].forEach(b=>b.classList.toggle("on",b.dataset.k===k));}
function setView(v){viewMode=v;renderHub();const seg=$("#viewseg");if(seg)[...seg.children].forEach(b=>b.classList.toggle("on",b.dataset.v===v));}

/* ============ DETAIL ============ */
function renderDetail(s){
 const[vc,vb]=verdictColor(s.fit);
 const idx=SCHOOLS.findIndex(x=>x.id===s.id);
 const prev=SCHOOLS[(idx-1+SCHOOLS.length)%SCHOOLS.length],next=SCHOOLS[(idx+1)%SCHOOLS.length];
 const sup=s.supplements||[];
 const news=NEWS[s.id]||[];
 const essays=ESSAYS[s.id]||[];
 $("#detail").innerHTML=`
 <header class="dhead" style="--ac:${s.ac};--ac2:${s.ac2}">
  <div class="dhead-bg"></div><div class="dhead-mono serif">${s.mono}</div>
  <div class="dhead-in">
   <div><div class="kicker">${s.type} · ${s.platform}</div>
    <h1 class="serif">${s.name}</h1>
    <div class="dmeta"><span>◍ ${s.city}, ${s.state}</span><span>❖ ${s.setting}</span><span>♟ ${s.undergrad} undergrads</span></div>
   </div>
   <div class="dhead-fit"><div class="vlabel">${s.verdict}</div><div class="vsub">Fit for entrepreneurs</div></div>
  </div>
 </header>
 <nav class="subnav"><div class="subnav-in" id="subnav">
  <a href="#sec-over" class="on">Overview</a><a href="#sec-news">News</a><a href="#sec-ent">Entrepreneurship</a><a href="#sec-adm">Admissions</a><a href="#sec-app">Application questions</a><a href="#sec-cost">Cost &amp; aid</a><a href="#sec-fit">Fit verdict</a>
 </div></nav>
 <div class="wrap">
  <section class="sec" id="sec-over"><div class="sec-h"><span class="n serif">01</span><h2 class="serif">Overview</h2></div>
   <p class="intro big">${s.entreHeadline}</p>
   <div class="cols"><div class="block"><h4>Why it earns a place</h4><ul class="ul">${s.strengths.map(x=>`<li>${x}</li>`).join("")}</ul></div>
    <div class="block"><h4>Snapshot</h4><ul class="ul">
     <li><b>Type</b> — ${s.type}, ${s.setting}</li><li><b>Undergraduates</b> — ${s.undergrad}</li>
     <li><b>Applies via</b> — ${s.platform}</li><li><b>Selectivity</b> — ${s.selectivity.rate} (${s.selectivity.tier})</li>
     <li><b>Entrepreneurship ranking</b> — ${s.entreRank}</li></ul></div></div>
  </section>

  <section class="sec" id="sec-news"><div class="sec-h"><span class="n serif">02</span><h2 class="serif">In the news</h2><span style="margin-left:auto;font-size:12px;color:var(--muted);font-weight:600">↻ updated daily</span></div>
   ${news.length?`<div class="newslist">${news.map(it=>`<a class="nrow" href="${it.url}" target="_blank" rel="noopener noreferrer"><div class="nrdate">${fmtDate(it.date)}</div><div class="nrbody"><div class="ntitle">${it.title}</div><div class="nblurb">${it.blurb}</div><div class="nsrc">${it.source} ↗</div></div></a>`).join("")}</div>`:`<p class="intro">No items logged in the latest refresh — the daily scout will populate this section.</p>`}
  </section>

  <section class="sec" id="sec-ent"><div class="sec-h"><span class="n serif">03</span><h2 class="serif">The entrepreneurship engine</h2></div>
   <div class="ent-banner"><div class="rank">${s.entreRank}</div><p>${s.entreHeadline}</p></div>
   <div class="subhead">Programs &amp; centers</div>
   <div class="pgrid">${s.programs.map(p=>`<div class="pcard"><div class="pt"><span class="d"></span>${p.t}</div><div class="pd">${p.d}</div></div>`).join("")}</div>
   <div class="subhead">Funding, competitions &amp; capital</div>
   <div class="pgrid">${s.funding.map(p=>`<div class="pcard"><div class="pt"><span class="d"></span>${p.t}</div><div class="pd">${p.d}</div></div>`).join("")}</div>
   <div class="cols" style="margin-top:22px"><div class="block"><h4>Degree pathways</h4><p style="font-size:14.5px;color:var(--ink-soft)">${s.degrees}</p></div>
    <div class="block"><h4>Founders &amp; network</h4><p style="font-size:14.5px;color:var(--ink-soft)">${s.founders}</p></div></div>
  </section>

  <section class="sec" id="sec-adm"><div class="sec-h"><span class="n serif">04</span><h2 class="serif">Admissions</h2></div>
   <div class="tiles">
    <div class="tile"><div class="tl">Acceptance rate</div><div class="tv">${s.selectivity.rate}</div><div class="tn">${s.selectivity.tier}</div></div>
    <div class="tile"><div class="tl">Testing</div><div class="tv" style="font-size:21px">${s.testPolicy}</div><div class="tn">${s.sat!=="—"?`SAT ${s.sat} · ACT ${s.act}`:"Not considered"}</div></div>
    <div class="tile"><div class="tl">Application fee</div><div class="tv">${s.fee}</div><div class="tn">Waivers available</div></div>
    <div class="tile"><div class="tl">Recommendations</div><div class="tv" style="font-size:18px">${s.recs}</div></div>
   </div>
   <div class="subhead">Key dates — application opens ${s.opens}</div>
   <div class="block"><div class="timeline">${s.deadlines.map(d=>`<div class="tlrow"><div class="tldate serif">${d.date}</div><div class="tlmid"><div class="tp">${d.plan}</div><div class="tnote">${d.note}</div></div>${cyctag(d.cycle)}</div>`).join("")}</div></div>
   <p class="tnote" style="font-size:12.5px;color:var(--muted);margin-top:12px">${s.selectivity.note}</p>
  </section>

  <section class="sec" id="sec-app"><div class="sec-h"><span class="n serif">05</span><h2 class="serif">Application questions</h2></div>
   <div class="essay-note"><span class="ic">✎</span><div>${s.appNote}</div></div>
   ${s.optIntro?`<p class="opt-intro">${s.optIntro}</p>`:""}
   ${sup.map(q=>`<details class="acc"><summary><div class="qmeta"><div class="qt">${q.title}</div><div class="qsub"><span class="req ${q.req==='Required'?'r':'o'}">${q.req}</span>${q.words}${cyctag(q.cycle)}</div></div><span class="exp">+</span></summary><div class="acc-body"><div class="ptext">${q.text}</div></div></details>`).join("")}
   ${essays.length?`<div class="essaybox"><h4>Essays that worked — where to study real examples</h4><p class="essay-disz">Study these for structure, specificity and voice — never copy. Admissions readers (and AI detectors) recognize recycled essays. Prompts change year to year, and these are third-party sources, so verify before relying.</p><div class="esrc">${essays.map(e=>`<a class="esrc-item" href="${e.u}" target="_blank" rel="noopener noreferrer"><span class="es-t">${e.t}</span><span class="es-m">${e.s} · ${e.m}</span></a>`).join("")}</div></div>`:``}
  </section>

  <section class="sec" id="sec-cost"><div class="sec-h"><span class="n serif">06</span><h2 class="serif">Cost &amp; aid</h2></div>
   <div class="tiles">${s.cost.mode==="private"
     ?`<div class="tile"><div class="tl">Sticker cost of attendance</div><div class="tv">${s.cost.sticker}</div><div class="tn">Before aid · 2025-26</div></div>`
     :`<div class="tile"><div class="tl">In-state</div><div class="tv">${s.cost.inState}</div><div class="tn">Total COA / yr</div></div><div class="tile"><div class="tl">Out-of-state</div><div class="tv">${s.cost.outState}</div><div class="tn">Total COA / yr</div></div>`}
   </div>
   <div class="block"><h4>Financial aid</h4><p style="font-size:14.5px;color:var(--ink-soft)">${s.cost.aid}</p></div>
  </section>

  <section class="sec" id="sec-fit" style="border-bottom:none"><div class="sec-h"><span class="n serif">07</span><h2 class="serif">Fit verdict</h2></div>
   <p class="intro big">Counselor's read: <strong style="color:${vc}">${s.verdict}</strong> for an entrepreneurship-focused undergraduate. Here's who it's best for — and what to weigh.</p>
   <div class="callout">
    <div class="block" style="border-left:3px solid var(--green)"><h4 style="color:var(--green)">✓ Best for</h4><p style="font-size:14.5px;color:var(--ink-soft)">${s.bestFor}</p></div>
    <div class="block" style="border-left:3px solid var(--amber)"><h4 style="color:var(--amber)">! Watch-outs</h4><ul class="ul warn">${s.watch.map(x=>`<li>${x}</li>`).join("")}</ul></div>
   </div>
  </section>

  <div class="dfoot"><div class="src"><b>Sources &amp; freshness.</b> ${s.src} Last verified ${META.updated}; auto-refreshed weekly.</div>
   <div class="navswitch"><button onclick="go('${prev.id}')">← ${prev.short}</button><button onclick="go('${next.id}')">${next.short} →</button></div>
  </div>
 </div>`;
 setupSubnav();
}
function setupSubnav(){const links=[...document.querySelectorAll('#subnav a')];const secs=links.map(l=>$(l.getAttribute('href')));
 const ob=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){const id='#'+e.target.id;links.forEach(l=>l.classList.toggle('on',l.getAttribute('href')===id));}});},{rootMargin:"-30% 0px -60% 0px"});
 secs.forEach(s=>s&&ob.observe(s));}

/* ============ ROUTER ============ */
function go(id){location.hash=id?("/"+id):"/";}
function route(){const h=location.hash.replace(/^#\/?/,"");const s=SCHOOLS.find(x=>x.id===h);
 if(s){document.body.classList.add("detail");renderDetail(s);$("#hub").classList.remove("active");$("#detail").classList.add("active");}
 else{document.body.classList.remove("detail");renderHub();$("#detail").classList.remove("active");$("#hub").classList.add("active");}
 window.scrollTo({top:0,behavior:"instant"in window?"instant":"auto"});}
window.addEventListener("hashchange",route);
route();
</script>
</body>
</html>
